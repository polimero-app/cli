name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: linux/amd64
            os: ubuntu-latest
          - target: linux/arm64
            os: ubuntu-24.04-arm
          - target: darwin/amd64
            os: macos-13
          - target: darwin/arm64
            os: macos-14
          - target: windows/amd64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux FFmpeg deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libavcodec-dev libavutil-dev libswscale-dev

      - name: Install macOS FFmpeg deps
        if: runner.os == 'macOS'
        run: brew install pkg-config ffmpeg

      - name: Setup MSYS2 and FFmpeg deps
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-libavcodec
            mingw-w64-x86_64-libavutil
            mingw-w64-x86_64-libswscale

      - name: Build artifact (Unix)
        if: runner.os != 'Windows'
        run: make build-release RELEASE_TARGETS=${{ matrix.target }} VERSION=${{ github.ref_name }}

      - name: Build artifact (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          export CC=x86_64-w64-mingw32-gcc
          export PKG_CONFIG=pkg-config
          make build-release RELEASE_TARGETS=${{ matrix.target }} VERSION=${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: polimero-${{ matrix.target }}
          path: dist/*
