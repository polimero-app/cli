name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: linux/amd64
            os: ubuntu-latest
            artifact: linux-amd64
          - target: linux/arm64
            os: ubuntu-24.04-arm
            artifact: linux-arm64
          - target: darwin/amd64
            os: macos-15-intel
            artifact: darwin-amd64
          - target: darwin/arm64
            os: macos-latest
            artifact: darwin-arm64
          - target: windows/amd64
            os: windows-latest
            artifact: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux FFmpeg deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libavcodec-dev libavutil-dev libswscale-dev

      - name: Install macOS FFmpeg deps
        if: runner.os == 'macOS'
        run: brew install pkg-config ffmpeg

      - name: Setup MSYS2 and FFmpeg deps
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          path-type: inherit
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ffmpeg

      - name: Build artifact (Unix)
        if: runner.os != 'Windows'
        run: make release RELEASE_TARGETS=${{ matrix.target }} VERSION=${{ github.ref_name }}

      - name: Build artifact (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "$(go env GOROOT)")/bin:/mingw64/bin:$PATH"
          export CC=x86_64-w64-mingw32-gcc
          export PKG_CONFIG=pkg-config
          make release RELEASE_TARGETS=${{ matrix.target }} VERSION=${{ github.ref_name }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: polimero-${{ matrix.artifact }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: polimero-*
          path: dist
          merge-multiple: true

      - name: Create release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --verify-tag --generate-notes --repo "${{ github.repository }}"
