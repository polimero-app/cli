name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Normalize line endings on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git reset --hard HEAD
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Linux FFmpeg deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libavcodec-dev libavutil-dev libswscale-dev
      - name: Install macOS FFmpeg deps
        if: runner.os == 'macOS'
        run: brew install pkg-config ffmpeg
      - run: make ci
